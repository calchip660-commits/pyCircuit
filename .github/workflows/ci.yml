name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  LLVM_VERSION: "19"
  CMAKE_BUILD_TYPE: Release

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Determine pre-commit diff range
        id: precommit-range
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "mode=range" >> "$GITHUB_OUTPUT"
            echo "from_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "mode=range" >> "$GITHUB_OUTPUT"
            echo "from_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --prune origin main develop || true
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            echo "mode=range" >> "$GITHUB_OUTPUT"
            echo "from_ref=$(git merge-base HEAD origin/main)" >> "$GITHUB_OUTPUT"
            echo "to_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "mode=all-files" >> "$GITHUB_OUTPUT"

      - name: Run pre-commit hooks on changed files
        if: steps.precommit-range.outputs.mode == 'range'
        run: |
          pre-commit run \
            --show-diff-on-failure \
            --from-ref "${{ steps.precommit-range.outputs.from_ref }}" \
            --to-ref "${{ steps.precommit-range.outputs.to_ref }}"

      - name: Run pre-commit hooks on all files
        if: steps.precommit-range.outputs.mode == 'all-files'
        run: pre-commit run --all-files --show-diff-on-failure

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install -e ".[dev]"

      - name: Validate wheel tag helper
        run: |
          python packaging/wheel/get_wheel_plat_name.py --system linux --arch x86_64
          python packaging/wheel/get_wheel_plat_name.py --system macos --arch arm64
          python packaging/wheel/get_wheel_plat_name.py --system macos --arch x86_64

      - name: Byte-compile packaging + CLI modules
        run: |
          python -m py_compile \
            packaging/wheel/create_wheel.py \
            packaging/wheel/get_wheel_plat_name.py \
            packaging/wheel/platform_tags.py \
            compiler/frontend/pycircuit/packaged_toolchain.py \
            compiler/frontend/pycircuit/cli.py

      - name: Run unit tests
        run: pytest tests/unit -m unit

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs deps
        run: python -m pip install -e ".[docs]"

      - name: Build docs
        run: mkdocs build

  system-tests-linux:
    name: System Tests (Linux)
    runs-on: ubuntu-latest
    needs: [pre-commit, unit-tests, docs]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install -e ".[dev]"

      - name: Install LLVM 19 + simulation deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg software-properties-common cmake ninja-build clang verilator iverilog
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "${LLVM_VERSION}"
          sudo apt-get install -y llvm-${LLVM_VERSION}-dev mlir-${LLVM_VERSION}-tools libmlir-${LLVM_VERSION}-dev
          echo "/usr/lib/llvm-${LLVM_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build staged toolchain
        run: |
          bash flows/scripts/pyc build \
            --llvm-config /usr/lib/llvm-${LLVM_VERSION}/bin/llvm-config \
            --build-dir "$PWD/.pycircuit_out/toolchain/build" \
            --install-prefix "$PWD/.pycircuit_out/toolchain/install"

      - name: Export toolchain env
        run: |
          echo "PYC_TOOLCHAIN_ROOT=$PWD/.pycircuit_out/toolchain/install" >> "$GITHUB_ENV"
          echo "$PWD/.pycircuit_out/toolchain/install/bin" >> "$GITHUB_PATH"

      - name: Run system tests
        run: pytest tests/system -m system

      - name: Upload gate logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pyc-system-test-logs
          path: docs/gates/logs/
          retention-days: 7

  build-linux:
    name: Build Toolchain (Linux)
    runs-on: ubuntu-latest
    needs: [pre-commit, unit-tests, docs, system-tests-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install wheel build deps
        run: python -m pip install setuptools wheel

      - name: Install LLVM 19 + build deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg software-properties-common cmake ninja-build clang
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "${LLVM_VERSION}"
          sudo apt-get install -y llvm-${LLVM_VERSION}-dev mlir-${LLVM_VERSION}-tools libmlir-${LLVM_VERSION}-dev
          echo "/usr/lib/llvm-${LLVM_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build staged toolchain
        run: |
          bash flows/scripts/pyc build \
            --llvm-config /usr/lib/llvm-${LLVM_VERSION}/bin/llvm-config \
            --build-dir "$PWD/.pycircuit_out/toolchain/build" \
            --install-prefix "$PWD/.pycircuit_out/toolchain/install"

      - name: Build platform wheel
        run: |
          python packaging/wheel/create_wheel.py \
            --install-dir "$PWD/.pycircuit_out/toolchain/install" \
            --out-dir "$PWD/dist"

      - name: Check wheel tag
        shell: bash
        run: |
          set -euxo pipefail
          wheel="$(basename dist/*.whl)"
          [[ "${wheel}" == pycircuit_hisi-*-py3-none-*.whl ]]

      - name: Upload toolchain
        uses: actions/upload-artifact@v4
        with:
          name: pyc-toolchain-linux
          path: .pycircuit_out/toolchain/install/
          retention-days: 1

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pyc-wheel-linux
          path: dist/*.whl
          retention-days: 1

  wheel-linux:
    name: Wheel Smoke (Linux)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install simulation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator iverilog

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: pyc-wheel-linux
          path: dist

      - name: Install wheel and run counter smoke
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv .venv-wheel
          source .venv-wheel/bin/activate
          pip install dist/*.whl
          export PYC_TOOLCHAIN_ROOT="$(python -c 'import pycircuit, pathlib; print((pathlib.Path(pycircuit.__file__).resolve().parent / "_toolchain").as_posix())')"
          export PYC_USE_INSTALLED_PYTHON_PACKAGE=1
          unset PYCC
          python -m pycircuit.cli build \
            designs/examples/counter/tb_counter.py \
            --out-dir /tmp/pyc-wheel-counter \
            --target both \
            --jobs 1 \
            --logic-depth 64 \
            --run-verilator

  build-macos:
    name: Build Toolchain (macOS)
    runs-on: macos-latest
    needs: [pre-commit, unit-tests, docs]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install wheel build deps
        run: python -m pip install setuptools wheel

      - name: Install Homebrew packages
        run: |
          brew update
          brew install ninja cmake llvm@19 python@3
          echo "$(brew --prefix llvm@19)/bin" >> "$GITHUB_PATH"

      - name: Build staged toolchain
        run: |
          bash flows/scripts/pyc build \
            --llvm-config "$(brew --prefix llvm@19)/bin/llvm-config" \
            --build-dir "$PWD/.pycircuit_out/toolchain/build" \
            --install-prefix "$PWD/.pycircuit_out/toolchain/install"

      - name: Build platform wheel
        run: |
          python packaging/wheel/create_wheel.py \
            --install-dir "$PWD/.pycircuit_out/toolchain/install" \
            --out-dir "$PWD/dist"

      - name: Check wheel tag
        shell: bash
        run: |
          set -euxo pipefail
          wheel="$(basename dist/*.whl)"
          [[ "${wheel}" == pycircuit_hisi-*-py3-none-*.whl ]]

      - name: Run counter compile smoke
        run: |
          export PYTHONPATH="$PWD/compiler/frontend"
          export PYC_TOOLCHAIN_ROOT="$PWD/.pycircuit_out/toolchain/install"
          export PATH="$PYC_TOOLCHAIN_ROOT/bin:$PATH"
          unset PYCC
          python -m pycircuit.cli build \
            designs/examples/counter/tb_counter.py \
            --out-dir /tmp/pyc-counter-macos \
            --target cpp \
            --jobs 1 \
            --logic-depth 64

      - name: Smoke test installed wheel
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv .venv-wheel
          source .venv-wheel/bin/activate
          pip install dist/*.whl
          export PYC_TOOLCHAIN_ROOT="$(python -c 'import pycircuit, pathlib; print((pathlib.Path(pycircuit.__file__).resolve().parent / "_toolchain").as_posix())')"
          export PYC_USE_INSTALLED_PYTHON_PACKAGE=1
          unset PYCC
          python -m pycircuit.cli build \
            designs/examples/counter/tb_counter.py \
            --out-dir /tmp/pyc-wheel-counter-macos \
            --target cpp \
            --jobs 1 \
            --logic-depth 64

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pyc-wheel-macos
          path: dist/*.whl
          retention-days: 1
